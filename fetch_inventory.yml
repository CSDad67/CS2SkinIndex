name: Fetch Steam Inventory

on:
  workflow_dispatch:
    inputs:
      steam_id:
        description: '17-digit Steam ID — find at steamidfinder.com (e.g. 76561198012345678)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-inventory:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Steam Inventory
        id: fetch
        run: python3 fetch_inventory.py --steamid "${{ github.event.inputs.steam_id }}" --output steam_inventory.json
        continue-on-error: true

      - name: Show output file
        if: always()
        run: |
          echo "=== steam_inventory.json ==="
          if [ -f steam_inventory.json ]; then
            cat steam_inventory.json | head -60
          else
            echo "FILE NOT WRITTEN - script crashed before saving"
          fi

      - name: Commit steam_inventory.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f steam_inventory.json ]; then
            git add steam_inventory.json
            git diff --staged --quiet || git commit -m "Steam inventory fetch $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Committed steam_inventory.json"
          else
            echo "No file to commit"
          fi
